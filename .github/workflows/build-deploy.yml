name: CI-CD Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      # Force Node.js 24 for all JavaScript actions
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # Step 1: Checkout the repo (latest version)
      - name: Checkout repository
        uses: actions/checkout@v6

      # Step 2: Set up Node.js (latest v4 setup-node action)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20  # Node.js runtime for your code

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 4: Run tests
      - name: Run tests
        run: npm test

      # Optional: Build your app
      - name: Build
        run: npm run build

      # Optional: Deploy (add your deployment steps here)
      # - name: Deploy
      #   run: <your-deploy-command>